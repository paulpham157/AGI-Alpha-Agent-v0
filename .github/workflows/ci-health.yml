name: "🩺 CI Health"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"
  workflow_run:
    workflows:
      - "🚀 Integration CI — Insight Demo"
      - "✅ PR CI"
    types:
      - completed

permissions:
  contents: read
  actions: write
  checks: read
  statuses: read
  pull-requests: read
  # Keep permissions limited to supported keys recognized by GitHub Actions.
  # Allowed keys: actions, checks, contents, deployments, id-token,
  # issues, discussions, packages, pages, pull-requests, repository-projects,
  # security-events, statuses.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-health:
    name: "CI watchdog"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ADMIN_GITHUB_TOKEN: ${{ secrets.ADMIN_GITHUB_TOKEN }}
      AGIALPHA_ADDRESS: "0xa61a3b3a130a9c20768eebf97e21515a6046a1fa"
      AGIALPHA_DECIMALS: 18
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Resolve CI target branch
        run: |
          default_branch=${{ github.event.repository.default_branch || 'main' }}
          eval_branch="$default_branch"
          policy_branch="$default_branch"

          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            workflow_head=$(jq -r '.workflow_run.head_branch // empty' "$GITHUB_EVENT_PATH")
            event_type=$(jq -r '.workflow_run.event // empty' "$GITHUB_EVENT_PATH")
            pr_base=$(jq -r '.workflow_run.pull_requests[0].base.ref // empty' "$GITHUB_EVENT_PATH")

            if [[ -n "$workflow_head" ]]; then
              eval_branch="$workflow_head"
            fi

            if [[ "$event_type" == "pull_request" && -n "$pr_base" ]]; then
              policy_branch="$pr_base"
            fi
          fi

          echo "CI_EVAL_BRANCH=$eval_branch" >> "$GITHUB_ENV"
          echo "CI_POLICY_BRANCH=$policy_branch" >> "$GITHUB_ENV"
      - name: Verify $AGIALPHA configuration
        run: python scripts/check_agialpha_config.py
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install watchdog dependencies
        run: |
          python -m pip install --upgrade pip
          # keep runtime lean by installing only the libraries required by the
          # watchdog scripts.
          python -m pip install pyyaml
      - name: Check CI health and remediate
        env:
          # Always use the workflow token for CI health checks. The admin token
          # is reserved for branch-protection operations and may be unavailable
          # or rotated independently.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HARD_WORKFLOW="pr-ci.yml"
          RERUN_ARGS=()
          DISPATCH_ARGS=(--dispatch-missing)
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            source_workflow=$(jq -r '.workflow_run.name // empty' "$GITHUB_EVENT_PATH")
            if [[ "$source_workflow" == "🚀 Integration CI — Insight Demo" ]]; then
              HARD_WORKFLOW="ci.yml"
            fi
            # A completed workflow_run already guarantees a concrete run exists.
            # Avoid extra dispatches in this context and only rerun failed runs.
            DISPATCH_ARGS=()
            # Repo-Healer marks run_attempt<2 as report-only; keep one automatic rerun
            # path for failed workflow_run contexts so AUTOPATCH_SAFE can activate.
            RERUN_ARGS+=("--rerun-failed")
          fi

          python scripts/check_ci_status.py \
            --token "${GITHUB_TOKEN}" \
            --wait-minutes 5 \
            --pending-grace-minutes 45 \
            --stale-minutes 90 \
            --cancel-stale \
            "${DISPATCH_ARGS[@]}" \
            "${RERUN_ARGS[@]}" \
            --poll-seconds 30 \
            --workflow "$HARD_WORKFLOW" \
            --branch "${CI_EVAL_BRANCH}" \
            --ref "${CI_EVAL_BRANCH}"

      - name: Check merge-surface integration CI health
        if: ${{ github.event_name != 'workflow_run' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/check_ci_status.py \
            --token "${GITHUB_TOKEN}" \
            --wait-minutes 5 \
            --pending-grace-minutes 45 \
            --stale-minutes 90 \
            --cancel-stale \
            --dispatch-missing \
            --poll-seconds 30 \
            --workflow ci.yml \
            --branch "${CI_POLICY_BRANCH}" \
            --ref "${CI_POLICY_BRANCH}"
      - name: Warn when admin token is unavailable
        if: ${{ env.ADMIN_GITHUB_TOKEN == '' }}
        run: echo "::warning::ADMIN_GITHUB_TOKEN not configured; branch protection verification skipped."

      - name: Verify branch protection on main
        if: ${{ env.ADMIN_GITHUB_TOKEN != '' }}
        env:
          # Requires a fine-grained or classic PAT with administration access
          # to branch protection settings. The default GITHUB_TOKEN lacks this
          # scope and will return 403s when querying protection rules.
          GITHUB_TOKEN: ${{ env.ADMIN_GITHUB_TOKEN }}
        run: |
          python scripts/verify_branch_protection.py \
            --branch "${CI_POLICY_BRANCH}" \
            --apply \
            --required-checks-file scripts/required_checks.json
